version: '3.9'

services:
  api:
    build:
      context: main
    container_name: fastapi_container
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app_network
    depends_on:
      - postgres
    volumes:
      - ./nginx/dist/images/:/app/main/images
    restart: unless-stopped
  postgres:
    image: postgres
    container_name: postgres_container
    volumes:
      - ./postgres_db/pgdata/:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${db_login}
      POSTGRES_PASSWORD: ${db_password}
      POSTGRES_DB: ${db_name}
    ports:
      - '${db_port}:5432'
    networks:
      - app_network
  nginx:
    build:
      context: nginx
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app_network
    volumes:
      - ./nginx/dist/images/:/usr/share/nginx/html/images

networks:
  app_network:
    driver: bridge
